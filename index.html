<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />

  <title>DropView</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cdefs%3E%3ClinearGradient id='r' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ef4444'/%3E%3Cstop offset='20%25' stop-color='%23f97316'/%3E%3Cstop offset='40%25' stop-color='%23eab308'/%3E%3Cstop offset='60%25' stop-color='%2322c55e'/%3E%3Cstop offset='80%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M13 2L3 14h9l-1 8 10-12h-9l1-8' stroke='url(%23r)'/%3E%3C/svg%3E">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-eval' 'unsafe-inline' https:; connect-src 'self' https:; img-src 'self' https: data: blob:;">
  <style>
    :root {
      --sidebar-w: 280px;
      --c-bg: #ffffff;
      --c-bg-sub: #f7f8fa;
      --c-bg-code: #f4f5f7;
      --c-border: #e5e7eb;
      --c-text: #111827;
      --c-text-2: #6b7280;
      --c-text-3: #9ca3af;
      --c-accent: #2563eb;
      --c-accent-bg: rgba(37,99,235,.06);
      --c-danger: #ef4444;
      --c-danger-bg: rgba(239,68,68,.06);
      --radius: 8px;
      color-scheme: light;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--c-bg); color: var(--c-text);
      font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; padding: 0; }
    svg { display: block; }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0; background: var(--c-bg-sub);
      border-right: 1px solid var(--c-border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: margin-left .2s ease;
    }
    .sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-w)); }
    .sidebar-head { padding: 14px 14px 10px 44px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
    .sidebar-head h1 { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
    .sidebar-search {
      width: 100%; padding: 7px 10px; border-radius: var(--radius);
      border: 1px solid var(--c-border); background: var(--c-bg);
      font-size: 12px; color: var(--c-text); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .sidebar-search:focus { border-color: var(--c-accent); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
    .sidebar-search::placeholder { color: var(--c-text-3); }

    .file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .file-list::-webkit-scrollbar { width: 5px; }
    .file-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 3px; }

    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; cursor: pointer;
      transition: background .1s; position: relative;
    }
    .file-item:hover { background: rgba(0,0,0,.04); }
    .file-item.active { background: var(--c-accent-bg); }
    .file-item.active::before {
      content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
      width: 3px; border-radius: 0 3px 3px 0; background: var(--c-accent);
    }
    /* circle toggle: always visible, left of file icon */
    .file-item .fi-toggle {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center;
      border: 1.5px solid var(--c-border); background: var(--c-bg);
      color: var(--c-text-3); transition: border-color .12s, background .12s, color .12s;
    }
    .file-item .fi-toggle svg { stroke-width: 2.5; }
    .file-item .fi-toggle:hover { border-color: var(--c-accent); color: var(--c-accent); }
    .file-item .fi-toggle.checked {
      border-color: var(--c-accent); background: var(--c-accent); color: #fff;
    }
    .file-item .fi-icon { flex-shrink: 0; color: var(--c-text-3); }
    .file-item.active .fi-icon { color: var(--c-accent); }
    .file-item .fi-body { flex: 1; min-width: 0; }
    .file-item .fi-name {
      font-size: 12.5px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-item .fi-sub { font-size: 10px; color: var(--c-text-3); margin-top: 1px; }
    /* delete: right side, hover only */
    .file-item .fi-del {
      width: 24px; height: 24px; border-radius: 5px; flex-shrink: 0;
      display: grid; place-items: center; color: var(--c-text-3);
      opacity: 0; transition: opacity .1s, background .1s, color .1s;
    }
    .file-item:hover .fi-del { opacity: 1; }
    .file-item .fi-del:hover { background: var(--c-danger-bg); color: var(--c-danger); }

    .sidebar-footer {
      padding: 10px 14px; border-top: 1px solid var(--c-border);
      display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap;
    }
    .sidebar-footer button {
      flex: 1 1 calc(50% - 3px); padding: 6px 0; border-radius: var(--radius);
      font-size: 11.5px; font-weight: 500; text-align: center;
      border: 1px solid var(--c-border); background: var(--c-bg);
      color: var(--c-text-2); transition: background .12s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .sidebar-footer button:hover { background: var(--c-bg-sub); }
    .sidebar-footer button.danger { color: var(--c-danger); border-color: rgba(239,68,68,.25); }
    .sidebar-footer button.danger:hover { background: var(--c-danger-bg); }

    .resize-handle {
      width: 4px; flex-shrink: 0; cursor: col-resize;
      background: transparent; transition: background .12s;
    }
    .resize-handle:hover, .resize-handle.dragging { background: var(--c-accent); opacity: .3; }
    body.resizing .sidebar { transition: none; }
    body.resizing iframe { pointer-events: none; }

    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Topbar ── */
    .topbar {
      height: 42px; padding: 0 12px 0 44px; border-bottom: 1px solid var(--c-border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      background: var(--c-bg);
    }
    /* ── Sidebar toggle (always top-left corner, never moves) ── */
    .sidebar-toggle {
      position: fixed; top: 8px; left: 8px; z-index: 50;
      width: 28px; height: 28px; border-radius: var(--radius);
      display: grid; place-items: center;
      border: 1px solid var(--c-border); background: var(--c-bg);
      color: var(--c-text-2); transition: background .12s, color .12s;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .sidebar-toggle:hover { background: var(--c-bg-sub); color: var(--c-text); }
    .topbar-info { flex: 1; font-size: 12px; color: var(--c-text-3); }
    .topbar-hint { font-size: 11px; color: var(--c-text-3); }
    .topbar-gh { color: #24292f; display: flex; align-items: center; margin-left: 4px; opacity: 0.6; transition: opacity 0.15s; }
    .topbar-gh:hover { opacity: 1; }
    /* ── Welcome ── */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      padding: 64px; text-align: center; background: var(--c-bg-sub);
      overflow-y: auto;
    }
    @media (min-height: 700px) { .welcome { justify-content: center; } }
    .welcome-icon { color: var(--c-text-3); opacity: .3; }
    .welcome h2 { font-size: 40px; font-weight: 700; color: var(--c-text); letter-spacing: -.02em; }
    .welcome p { font-size: 18px; color: var(--c-text-2); max-width: 560px; line-height: 1.7; }
    .welcome-actions { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
    .welcome-btn {
      padding: 16px 36px; border-radius: var(--radius);
      font-size: 17px; font-weight: 600; transition: background .12s, box-shadow .12s;
      display: flex; align-items: center; gap: 10px;
    }
    .welcome-btn.primary {
      background: var(--c-accent); color: #fff; border: none;
      box-shadow: 0 1px 3px rgba(37,99,235,.25);
    }
    .welcome-btn.primary:hover { background: #1d4ed8; box-shadow: 0 2px 8px rgba(37,99,235,.3); }
    .welcome-btn.secondary {
      background: var(--c-bg); color: var(--c-text-2);
      border: 1px solid var(--c-border);
    }
    .welcome-btn.secondary:hover { background: var(--c-bg-sub); }
    .welcome-tip {
      margin-top: 24px; padding: 24px 32px; border-radius: 10px;
      background: var(--c-bg); border: 1px solid var(--c-border);
      max-width: 560px; text-align: left;
    }
    .welcome-tip-title {
      font-size: 14px; font-weight: 700; color: var(--c-text-2); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .welcome-tip p { font-size: 14px; color: var(--c-text-3); line-height: 1.7; margin: 0 0 12px; }
    .welcome-tip code {
      display: block; padding: 14px 18px; border-radius: 8px;
      background: var(--c-bg-sub); border: 1px solid var(--c-border);
      font-family: ui-monospace, monospace; font-size: 13px; color: var(--c-text);
      line-height: 1.6; white-space: pre-wrap; word-break: break-all;
    }
    @media (max-height: 600px), (max-width: 480px) {
      .welcome { padding: 24px 16px; gap: 16px; }
      .welcome-icon svg { width: 48px; height: 48px; }
      .welcome h2 { font-size: 28px; }
      .welcome p { font-size: 15px; }
      .welcome-btn { padding: 12px 20px; font-size: 14px; }
      .welcome-actions { gap: 10px; }
      .welcome-tip { padding: 16px 18px; margin-top: 12px; }
    }

    /* ── Drag overlay ── */
    .drag-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
      display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    .drag-overlay.show { display: flex; }
    .drag-overlay-icon { color: var(--c-accent); opacity: .4; }
    .drag-overlay-text { font-size: 18px; font-weight: 600; color: var(--c-accent); }
    .drag-overlay-sub { font-size: 13px; color: var(--c-text-3); }

    /* ── Paste modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,.3); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: var(--c-bg); border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
      width: min(600px, calc(100vw - 40px)); max-height: calc(100vh - 80px);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-head {
      padding: 16px 20px; border-bottom: 1px solid var(--c-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-head h3 { font-size: 14px; font-weight: 700; }
    .modal-close {
      width: 28px; height: 28px; border-radius: var(--radius);
      display: grid; place-items: center; color: var(--c-text-3);
      transition: background .1s;
    }
    .modal-close:hover { background: var(--c-bg-sub); }
    .modal-body { padding: 16px 20px; flex: 1; overflow: auto; display: flex; flex-direction: column; gap: 12px; }
    .modal-body textarea {
      width: 100%; min-height: 240px; padding: 12px; border-radius: var(--radius);
      border: 1px solid var(--c-border); background: var(--c-bg-code);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px; line-height: 1.6; color: var(--c-text); resize: vertical; outline: none;
      transition: border-color .15s;
    }
    .modal-body textarea:focus { border-color: var(--c-accent); }
    .modal-body textarea::placeholder { color: var(--c-text-3); }
    .modal-foot {
      padding: 12px 20px; border-top: 1px solid var(--c-border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .modal-foot button {
      padding: 7px 18px; border-radius: var(--radius); font-size: 12.5px; font-weight: 600;
      transition: background .12s;
    }
    .modal-foot .m-cancel { border: 1px solid var(--c-border); color: var(--c-text-2); background: var(--c-bg); }
    .modal-foot .m-cancel:hover { background: var(--c-bg-sub); }
    .modal-foot .m-submit { background: var(--c-accent); color: #fff; }
    .modal-foot .m-submit:hover { background: #1d4ed8; }

    /* ── Preview grid ── */
    .grid {
      flex: 1; min-height: 0; padding: 10px; overflow: auto;
      display: grid; gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      grid-auto-rows: minmax(420px, 1fr);
      background: var(--c-bg-sub);
    }
    .pane {
      border: 1px solid var(--c-border); border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
      background: var(--c-bg);
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .pane-head {
      height: 36px; padding: 0 6px 0 12px; border-bottom: 1px solid var(--c-border);
      display: flex; align-items: center; gap: 2px; flex-shrink: 0;
      background: var(--c-bg-sub);
    }
    .pane-title {
      flex: 1; font-size: 12px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--c-text-2);
    }
    .pane-btn {
      width: 26px; height: 26px; border-radius: 6px;
      display: grid; place-items: center; color: var(--c-text-3);
      transition: background .1s, color .1s;
    }
    .pane-btn:hover { background: rgba(0,0,0,.06); color: var(--c-text); }
    .pane-btn.active { color: var(--c-accent); background: var(--c-accent-bg); }
    .pane-content { flex: 1; min-height: 0; display: flex; position: relative; }
    .pane-content iframe { flex: 1; min-width: 0; border: 0; background: var(--c-bg); display: block; }
    .pane-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--c-bg); color: #9ca3af; font-size: 13px; gap: 10px; z-index: 1; }
    .pane-loading .pl-spinner { width: 22px; height: 22px; border: 2.5px solid #e5e7eb; border-top-color: #6b7280; border-radius: 50%; animation: pl-spin .8s linear infinite; }
    @keyframes pl-spin { to { transform: rotate(360deg); } }
    .pane-content .code-view {
      flex: 1; min-width: 0; overflow: auto; padding: 12px;
      background: var(--c-bg-code);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-all;
      color: var(--c-text);
    }

    /* ── Toast ── */
    .toast {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(12px);
      padding: 9px 18px; border-radius: 999px;
      background: var(--c-text); color: #fff;
      font-size: 12.5px; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; white-space: nowrap; z-index: 800;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .grid::-webkit-scrollbar { width: 6px; }
    .grid::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 3px; }
  </style>
</head>

<div id="root"></div>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "jsxDropViewer.items.v1";
  const MAX_ITEMS = 80;
  const MAX_BYTES = 4_500_000;

  // ── SVG Icons ──

      "copy":          ["M20 9h-9a2 2 0 00-2 2v9a2 2 0 002 2h9a2 2 0 002-2v-9a2 2 0 00-2-2z", "M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"],
      "trash":         ["M3 6h18", "M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6", "M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"],
      "clipboard":     ["M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2", "M9 2h6a1 1 0 011 1v2a1 1 0 01-1 1H9a1 1 0 01-1-1V3a1 1 0 011-1z"],
      "plus":          ["M12 5v14", "M5 12h14"],
      "file":          ["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z", "M14 2v6h6", "M16 13H8", "M16 17H8", "M10 9H8"],
      "folder":        ["M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"],
      "download":      ["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4", "M7 10l5 5 5-5", "M12 15V3"],
      "mouse-pointer": ["M2 2L6.7 21.3L9.3 16.9L12.9 22L17.1 19.1L13.5 14L18.5 13z"],
      "zap":           ["M13 2L3 14h9l-1 8 10-12h-9l1-8"],
      "columns":       ["M12 3h7a2 2 0 012 2v14a2 2 0 01-2 2h-7", "M12 3H5a2 2 0 00-2 2v14a2 2 0 002 2h7"],
      "plus-sm":       ["M12 6v12", "M6 12h12"],
      "check-sm":      ["M20 6L9 17l-5-5"],
      "github":        ["M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"],
    };
    for (const d of (paths[name] || [])) {
      const p = document.createElementNS(svgNs, "path");
      p.setAttribute("d", d);
      s.appendChild(p);

    return s;
  }

  // ── Utility ──
  const el = (tag, attrs={}, ...children) => {
    const n = document.createElement(tag);
    for (const [k,v] of Object.entries(attrs)) {
      if (k === "class") n.className = v;
      else if (k === "style" && typeof v === "object") Object.assign(n.style, v);
      else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v !== undefined && v !== null) n.setAttribute(k, String(v));
    }
    for (const c of children.flat()) {
      if (c == null) continue;
      n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    }
    return n;
  };
  const nowIso = () => new Date().toISOString();
  const fmt = (iso) => {
    const d = new Date(iso), p = (x) => String(x).padStart(2,"0");
    return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  };
  const hash32 = (s) => {
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return (h >>> 0).toString(16).padStart(8,"0");
  };

  // ── Toast ──
  let toastTimer;
  function toast(msg, ms=2000) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    void t.offsetWidth;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), ms);
  }

  // ── Storage ──
  function loadItems() {
    try {
      const items = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (!Array.isArray(items)) return [];
      return items

      el("div", { class: "welcome-tip" },

        el("p", {}, "Claude \u306A\u3069\u306E\u30B3\u30FC\u30C7\u30A3\u30F3\u30B0\u30A8\u30FC\u30B8\u30A7\u30F3\u30C8\u306B\u8907\u6570\u30D5\u30A1\u30A4\u30EB\u3092\u4E00\u5EA6\u306B\u751F\u6210\u3055\u305B\u3001DropView \u3067\u4E26\u3079\u3066\u6BD4\u8F03\u3067\u304D\u307E\u3059\u3002"),
        el("code", {}, "\u30AB\u30D5\u30A7\u306E\u30E1\u30CB\u30E5\u30FC\u30DA\u30FC\u30B8\u3092\u7570\u306A\u308B\u65B9\u5411\u6027\u30674\u6848 JSX \u3067\u751F\u6210\u3057\u3066\u3002"),
        el("code", { style: { marginTop: "8px" } }, "\u6DFB\u4ED8 Excel \u304B\u3089\u7570\u306A\u308B\u65B9\u5411\u6027\u3067\u4F1D\u3048\u305F\u3044\u30E1\u30C3\u30BB\u30FC\u30B8\u3092\u8003\u3048\u3066\u3001\n\u30A4\u30F3\u30BF\u30E9\u30AF\u30C6\u30A3\u30D6\u306A\u53EF\u8996\u5316\u3092\u3059\u308B JSX \u30924\u6848\u751F\u6210\u3057\u3066\u3002")
      )
    );

    const grid = el("div", { class: "grid" });
    const main = el("div", { class: "main" }, topbar, welcome);
    const toastEl = el("div", { id: "toast", class: "toast" });

    const root = document.getElementById("root");
    root.appendChild(el("div", { class: "app" }, sidebar, resizeHandle, main));
    document.body.appendChild(sideToggle);
    document.body.appendChild(dragOverlay);
    document.body.appendChild(modalBackdrop);
    document.body.appendChild(toastEl);

    // ── Sidebar resize ──
    let isResizing = false;
    resizeHandle.addEventListener("mousedown", (e) => {
      isResizing = true; resizeHandle.classList.add("dragging");
      document.body.classList.add("resizing"); e.preventDefault();
    });
    window.addEventListener("mousemove", (e) => {
      if (!isResizing) return;
      const w = Math.max(180, Math.min(500, e.clientX));
      document.documentElement.style.setProperty("--sidebar-w", w + "px");
    });
    window.addEventListener("mouseup", () => {
      if (!isResizing) return;
      isResizing = false; resizeHandle.classList.remove("dragging");
      document.body.classList.remove("resizing");
    });

    // ── Core ──
    function addItem(name, code) {
      const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      state.items.unshift({ id, name, createdAt: nowIso(), size: code.length, jsx: code });
      const seen = new Set();
      state.items = state.items.filter(x => {
        const k = x.name + "::" + hash32(x.jsx);
        if (seen.has(k)) return false;
        seen.add(k); return true;
      });
      saveItems(state.items);
      // auto-open the new item, add to selection if Ctrl was held during drop
      state.selected.add(id);
      renderAll();
      toast(`\u8FFD\u52A0: ${name}`);
    }

    function filteredItems() {
      const q = state.query.trim().toLowerCase();
      if (!q) return state.items;
      return state.items.filter(x => x.name.toLowerCase().includes(q) || x.jsx.toLowerCase().includes(q));
    }

    function renderFileList() {
      fileListEl.innerHTML = "";
      const items = filteredItems();
      if (items.length === 0) {
        fileListEl.appendChild(el("div", { style: { padding: "20px 14px", textAlign: "center", color: "var(--c-text-3)", fontSize: "12px" } },
          state.items.length === 0 ? "\u30D5\u30A1\u30A4\u30EB\u3092\u30C9\u30ED\u30C3\u30D7\u307E\u305F\u306F\u8CBC\u308A\u4ED8\u3051" : "\u898B\u3064\u304B\u308A\u307E\u305B\u3093"
        ));
        return;
      }
      for (const it of items) {
        const active = state.selected.has(it.id);

        // Circle toggle: checked (accent) or unchecked (gray +)
        const toggle = el("button", {
          class: "fi-toggle" + (active ? " checked" : ""),
          title: active ? "\u6BD4\u8F03\u304B\u3089\u5916\u3059" : "\u6BD4\u8F03\u306B\u8FFD\u52A0",
          onclick: (e) => {
            e.stopPropagation();
            if (state.selected.has(it.id)) state.selected.delete(it.id);
            else state.selected.add(it.id);
            renderFileList();
            renderMain();
          }
        }, icon(active ? "check-sm" : "plus-sm", 14));

        const delBtn = el("button", { class: "fi-del", title: "\u524A\u9664", onclick: (e) => {
          e.stopPropagation();
          state.items = state.items.filter(x => x.id !== it.id);
          state.selected.delete(it.id); state.codeVisible.delete(it.id);
          saveItems(state.items); renderFileList(); renderMain();
          toast(`\u524A\u9664: ${it.name}`);
        }}, icon("trash", 14));

        // Click row = single view (replace selection)
        const row = el("div", { class: "file-item" + (active ? " active" : ""), onclick: () => {
          state.selected = new Set([it.id]);
          renderFileList();
          renderMain();
        }},
          toggle,
          el("span", { class: "fi-icon" }, icon("file", 15)),
          el("div", { class: "fi-body" },
            el("div", { class: "fi-name", title: it.name }, it.name),
            el("div", { class: "fi-sub" }, `${fmt(it.createdAt)}  ${it.size} chars`)
          ),
          delBtn
        );
        fileListEl.appendChild(row);
      }
    }

    // Track live panes: id -> { pane, iframe, codeVisible }
    const livePanes = new Map();

    function buildPane(it) {
      const showCode = state.codeVisible.has(it.id);
      const pane = el("div", { class: "pane" });
      pane.dataset.id = it.id;

      const reloadBtn = el("button", { class: "pane-btn", title: "\u30EA\u30ED\u30FC\u30C9" }, icon("refresh", 14));
      const codeBtn = el("button", { class: "pane-btn" + (showCode ? " active" : ""), title: "\u30BD\u30FC\u30B9\u30B3\u30FC\u30C9" }, icon("code", 14));
      const copyBtn = el("button", { class: "pane-btn", title: "\u30B3\u30FC\u30C9\u3092\u30B3\u30D4\u30FC" }, icon("copy", 14));
      const closeBtn = el("button", { class: "pane-btn", title: "\u9589\u3058\u308B" }, icon("x", 14));

      reloadBtn.addEventListener("click", () => reloadPane(it.id));
      codeBtn.addEventListener("click", () => {
        if (state.codeVisible.has(it.id)) state.codeVisible.delete(it.id);
        else state.codeVisible.add(it.id);
        rebuildPaneContent(it.id);
      });
      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(it.jsx).then(() => toast("\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F"));
      });
      closeBtn.addEventListener("click", () => {
        state.selected.delete(it.id);
        removePaneFromGrid(it.id);
        renderFileList();
        updateTopInfo();
      });

      const head = el("div", { class: "pane-head" },
        el("span", { class: "pane-title", title: it.name }, it.name),
        reloadBtn, codeBtn, copyBtn, closeBtn
      );
      pane.appendChild(head);

      const content = el("div", { class: "pane-content" });
      if (showCode) {
        const codeView = el("div", { class: "code-view" }, it.jsx);
        codeView.style.flex = "0 0 45%";
        codeView.style.borderRight = "1px solid var(--c-border)";
        content.appendChild(codeView);
      }
      const iframe = el("iframe", { sandbox: "allow-scripts", referrerpolicy: "no-referrer" });
      content.appendChild(iframe);
      pane.appendChild(content);

      loadIframe(iframe, it);

      livePanes.set(it.id, { pane, iframe, codeVisible: showCode });
      return pane;
    }

    function loadIframe(iframe, it) {
      const ft = fileType(it.name);
      if (ft === "html") {
        iframe.srcdoc = it.jsx;
        return;
      }
      // 親ページ側にローディングオーバーレイを表示（iframe内スピナー表示前の空白対策）
      const content = iframe.parentElement;
      let overlay = content.querySelector(".pane-loading");
      if (overlay) overlay.remove();
      if (ft === "svelte" || ft === "vue") {
        overlay = el("div", { class: "pane-loading" });
        overlay.innerHTML = '<div class="pl-spinner"></div>' + (ft === "svelte" ? "Svelte コンパイラを読み込み中…" : "Vue を読み込み中…");
        content.appendChild(overlay);
      }
      // iframe の load イベントは about:blank 用が先に発火して once リスナーを
      // 消費してしまうため、iframe 内スクリプトから IFRAME_READY を postMessage で
      // 通知してもらい、それを受けてコードを送信する。
      const onReady = (ev) => {
        if (ev.source !== iframe.contentWindow || !ev.data || ev.data.type !== "IFRAME_READY") return;
        window.removeEventListener("message", onReady);
        if (overlay) { overlay.remove(); overlay = null; }
        if (ft === "vue") {
          try { postVueCode(iframe, it.jsx); } catch (e) {
            iframe.contentWindow.postMessage({ type: "RUN_VUE", template: "", code: `throw new Error(${JSON.stringify((e&&(e.stack||e.message))||String(e))});` }, "*");
          }
        } else if (ft === "svelte") {
          try { postSvelteCode(iframe, it.jsx); } catch (e) {
            iframe.contentWindow.postMessage({ type: "RUN_SVELTE", source: `<script>throw new Error(${JSON.stringify((e&&(e.stack||e.message))||String(e))})<\/script>` }, "*");
          }
        } else {
          try {
            const code = compileToRunnableJS(it.jsx, it.name);
            iframe.contentWindow.postMessage({ type: "RUN_JSX", code }, "*");
          } catch (e) {
            const msg = (e && (e.stack || e.message)) || String(e);
            iframe.contentWindow.postMessage({ type: "RUN_JSX", code: `throw new Error(${JSON.stringify(msg)});` }, "*");
          }
        }
      };
      window.addEventListener("message", onReady);
      iframe.srcdoc = ft === "vue" ? makeVueIframeDoc(it.jsx) : ft === "svelte" ? makeSvelteIframeDoc() : makeIframeDoc();
    }

    function reloadPane(id) {
      const entry = livePanes.get(id);
      if (!entry) return;
      const it = state.items.find(x => x.id === id);
      if (!it) return;
      loadIframe(entry.iframe, it);
    }

    function rebuildPaneContent(id) {
      const entry = livePanes.get(id);
      if (!entry) return;
      const it = state.items.find(x => x.id === id);
      if (!it) return;
      // Remove old pane, build new one in same position
      const parent = entry.pane.parentNode;
      const next = entry.pane.nextSibling;
      entry.pane.remove();
      livePanes.delete(id);
      const newPane = buildPane(it);
      if (next) parent.insertBefore(newPane, next);
      else parent.appendChild(newPane);
      // Update code button in file list
      renderFileList();
    }

    function removePaneFromGrid(id) {
      const entry = livePanes.get(id);
      if (entry) { entry.pane.remove(); livePanes.delete(id); }
      if (state.selected.size === 0) showWelcome();
      updateTopInfo();
    }

    function showWelcome() {
      while (main.children.length > 1) main.removeChild(main.lastChild);
      main.appendChild(welcome);
    }

    function updateTopInfo() {
      const n = state.selected.size;
      topInfo.textContent = n === 0
        ? `${state.items.length} \u30D5\u30A1\u30A4\u30EB`
        : n === 1
          ? (state.items.find(x => state.selected.has(x.id))?.name || "")
          : `${n} \u30D5\u30A1\u30A4\u30EB\u3092\u6BD4\u8F03\u4E2D`;
      topHint.textContent = "";
    }

    function renderMain() {
      const selIds = new Set(state.selected);
      const sels = state.items.filter(x => selIds.has(x.id));

      updateTopInfo();

      if (sels.length === 0) {
        // Clean up all live panes
        for (const [id, entry] of livePanes) entry.pane.remove();
        livePanes.clear();
        showWelcome();
        return;
      }

      // Remove welcome if present, ensure grid is in main.
      // 注意: grid が既に main 内にある場合は appendChild しない。
      // appendChild は既存の子を一度取り外して再追加するため、
      // 中の iframe が全てリロードされてしまう。
      if (main.contains(welcome)) welcome.remove();
      if (!main.contains(grid)) main.appendChild(grid);

      // Diff: remove panes no longer selected
      for (const [id, entry] of livePanes) {
        if (!selIds.has(id)) { entry.pane.remove(); livePanes.delete(id); }
      }
      // Add new panes (preserve existing ones untouched)
      for (const it of sels) {
        if (!livePanes.has(it.id)) {
          grid.appendChild(buildPane(it));
        }
      }
    }

    function renderAll() { renderFileList(); renderMain(); }

    // ── D&D ──
    let dragCount = 0;
    window.addEventListener("dragenter", (e) => { e.preventDefault(); dragCount++; dragOverlay.classList.add("show"); });
    window.addEventListener("dragleave", () => { dragCount--; if (dragCount <= 0) { dragCount = 0; dragOverlay.classList.remove("show"); } });
    window.addEventListener("dragover", (e) => e.preventDefault());
    const SUPPORTED_RE = /\.(jsx|js|mjs|cjs|tsx|ts|html?|vue|svelte)$/i;

    // Read files from a directory handle (File System Access API)
    async function readDirHandle(dirHandle) {
      const results = [];
      for await (const [name, handle] of dirHandle) {
        if (handle.kind === "directory") {
          results.push(...await readDirHandle(handle));
        } else if (handle.kind === "file") {
          const f = await handle.getFile();
          if (SUPPORTED_RE.test(f.name)) results.push(f);
        }
      }
      return results;
    }

    function processDroppedFiles(files) {
      if (files.length === 0) { toast("\u5BFE\u5FDC\u30D5\u30A1\u30A4\u30EB\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093\u3067\u3057\u305F"); return; }
      const newIds = [];
      let pending = files.length;
      for (const f of files) {
        if (!SUPPORTED_RE.test(f.name)) { pending--; continue; }
        const reader = new FileReader();
        reader.onload = () => {
          const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
          const code = String(reader.result || "");
          state.items.unshift({ id, name: f.name, createdAt: nowIso(), size: code.length, jsx: code });
          newIds.push(id);
          if (--pending <= 0) {
            const seen = new Set();
            state.items = state.items.filter(x => {
              const k = x.name + "::" + hash32(x.jsx);
              if (seen.has(k)) return false;
              seen.add(k); return true;
            });
            saveItems(state.items);
            state.selected = new Set(newIds);
            renderAll();
            toast(newIds.length > 1 ? `${newIds.length} \u30D5\u30A1\u30A4\u30EB\u3092\u8FFD\u52A0\u30FB\u6BD4\u8F03\u4E2D` : `\u8FFD\u52A0: ${files[0].name}`);
          }
        };
        reader.onerror = () => { if (--pending <= 0 && newIds.length === 0) toast("\u5BFE\u5FDC\u30D5\u30A1\u30A4\u30EB\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093\u3067\u3057\u305F"); };
        reader.readAsText(f);
      }
      if (pending <= 0 && newIds.length === 0) toast("\u5BFE\u5FDC\u30D5\u30A1\u30A4\u30EB\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093\u3067\u3057\u305F");
    }

    window.addEventListener("drop", (e) => {
      e.preventDefault(); dragCount = 0; dragOverlay.classList.remove("show");

      // Check for directory via getAsFileSystemHandle (modern API) or webkitGetAsEntry (fallback)
      const dtItems = Array.from(e.dataTransfer.items || []);
      const supportsHandle = dtItems.length > 0 && typeof dtItems[0].getAsFileSystemHandle === "function";

      if (supportsHandle) {
        // Modern: File System Access API
        // Grab all handles synchronously before any await (handles expire after the event)
        const handlePromises = dtItems.map(item => item.getAsFileSystemHandle().catch(() => null));
        (async () => {
          const handles = await Promise.all(handlePromises);
          const allFiles = [];
          for (const handle of handles) {
            if (!handle) continue;
            if (handle.kind === "directory") {
              allFiles.push(...await readDirHandle(handle));
            } else if (handle.kind === "file") {
              const f = await handle.getFile();
              if (SUPPORTED_RE.test(f.name)) allFiles.push(f);
            }
          }
          processDroppedFiles(allFiles);
        })();
      } else {
        // Fallback: use dataTransfer.files directly (no folder support)
        const files = Array.from(e.dataTransfer.files || []);
        processDroppedFiles(files);
      }
    });

    // ── Keyboard ──
    window.addEventListener("keydown", (e) => {
      if (e.key === "Delete" && state.selected.size > 0 && !modalBackdrop.classList.contains("show")) {
        const n = state.selected.size;
        state.items = state.items.filter(x => !state.selected.has(x.id));
        state.selected.clear(); saveItems(state.items); renderAll();
        toast(`${n}\u4EF6\u524A\u9664`);
      }
      if (e.key === "Escape") closePaste();
      if ((e.ctrlKey || e.metaKey) && e.key === "v" && !["INPUT","TEXTAREA"].includes(document.activeElement?.tagName)) {
        e.preventDefault(); openPaste();
        navigator.clipboard.readText().then(t => { if (t) pasteTextarea.value = t; }).catch(() => {});
      }
      // Ctrl+A to select all
      if ((e.ctrlKey || e.metaKey) && e.key === "a" && !["INPUT","TEXTAREA"].includes(document.activeElement?.tagName)) {
        e.preventDefault();
        state.selected = new Set(state.items.map(x => x.id));
        renderAll();
        toast(`\u5168${state.items.length}\u4EF6\u3092\u9078\u629E`);
      }
    });

    renderAll();
  }

  createApp();
})();
</script>
</body>
</html>
